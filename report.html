<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Capitani di Futuro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #2563eb; --accent-dark: #1e40af; --accent-light: #60a5fa; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Riquadro Grigio STRETTO LATERALMENTE SULLE COLONNE */
        .cylinder-wrapper {
            width: max-content; 
            max-width: 100%;
            height: 240px; 
            background: #f1f5f9;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: flex-end; 
            justify-content: center; 
            gap: 20px; 
            padding: 0 25px 0 25px; 
            border-bottom: 3px solid #cbd5e1;
            margin: 0 auto 30px auto; /* CORRETTO: Aggiunto margine di 30px sotto per staccarlo */
            overflow-x: auto;
        }

        .bar-wrapper {
            height: 200px; 
            width: 45px; 
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Colonna SCURA */
        .bar-3d {
            width: 100%;
            border-radius: 12px 12px 0 0; 
            background: linear-gradient(to right, #0f172a, #334155, #0f172a);
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.5), inset 2px 0 5px rgba(255,255,255,0.1), 0 5px 10px -3px rgba(0,0,0,0.2);
            position: relative;
            transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        /* Etichetta GIALLA */
        .inner-label {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            color: #facc15; 
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            white-space: nowrap;
            pointer-events: none;
        }

        .score-badge {
            position: absolute;
            top: -24px;
            font-weight: 900;
            color: #0f172a; 
            font-size: 14px;
        }

        @media print {
		@page { margin: 0; }
            body { padding: 10mm !important; zoom: 1.35; background: white !important; }
			* {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .main-container { 
                max-width: 100% !important; 
                page-break-inside: avoid;
            }
            .cylinder-wrapper {
                overflow: visible !important;
                gap: 12px !important;
            }
            .no-print { display: none !important; }
            
            .main-container { max-width: 100%; border: none; box-shadow: none; margin: 0; padding: 10px; }
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <nav class="no-print w-full bg-white border-b border-slate-200 px-4 py-2 flex justify-between items-center sticky top-0 z-50">
        <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Area Riservata Admin</span>
        <div class="flex gap-2">
            <button onclick="window.close()" class="px-3 py-1.5 border rounded-lg text-[10px] font-bold hover:bg-slate-50 cursor-pointer">Chiudi</button>
            <button onclick="window.print()" class="px-4 py-1.5 bg-blue-600 text-white rounded-lg text-[10px] font-bold shadow-sm cursor-pointer">Salva PDF</button>
        </div>
    </nav>

    <main class="main-container w-full max-w-4xl bg-white md:my-4 md:rounded-[30px] shadow-xl shadow-slate-200 p-4 md:px-8 md:py-6 fade-in">
        
        <header class="text-center space-y-1 mb-5">
            <h2 class="text-blue-600 font-black uppercase tracking-[0.2em] text-[9px]">Assessment Ufficiale</h2>
            <h1 class="text-2xl md:text-3xl font-black tracking-tighter text-slate-900 uppercase">Report Capitani di Futuro</h1>
            <p id="rep-name" class="text-lg md:text-xl font-medium text-slate-400 italic leading-tight">Caricamento...</p>
        </header>

        <section class="cylinder-wrapper mx-auto">
            <div class="absolute inset-0 flex flex-col justify-between py-5 px-2 opacity-20 pointer-events-none">
                <div class="border-t border-slate-400 w-full"></div>
                <div class="border-t border-slate-400 w-full"></div>
                <div class="border-t border-slate-400 w-full"></div>
            </div>

            <script>
                const dims = ["Leadership", "Collaborazione", "Cambiamento", "Pianificazione", "Autoanalisi", "Motivazione", "Visione"];
                dims.forEach((d, i) => {
                    document.write(`
                        <div class="bar-wrapper">
                            <div id="bar-${i+1}" class="bar-3d" style="height: 0%;">
                                <span id="score-${i+1}" class="score-badge opacity-0 transition-opacity duration-1000">0.0</span>
                                <span class="inner-label">${d}</span>
                            </div>
                        </div>
                    `);
                });
            </script>
        </section>

		<section class="bg-[#f1f5f9] rounded-[20px] p-5 shadow-lg mx-auto w-full max-w-[485px] border border-slate-200">
            <h3 class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-2 flex gap-1">
                VALUTAZIONE QUALITATIVA <span id="profile-style" class="text-slate-400"></span>
            </h3>
            <div id="profile-description" contenteditable="true" class="text-slate-900 leading-snug text-sm font-medium italic text-justify focus:outline-none">
                Analisi interpretativa in fase di generazione...
            </div>
        </section>

        <footer class="mt-5 pt-3 border-t border-slate-100 flex justify-between items-center text-[8px] font-black uppercase tracking-widest text-slate-400 mx-auto">
            <div>Data: <span id="rep-date" class="text-slate-500">--/--/----</span></div>
            <div class="flex items-center gap-1.5 no-print">
                <div class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                Sincronizzato
            </div>
        </footer>
    </main>

    <script>
        // INSERISCI QUI LE TUE CHIAVI SUPABASE
        const SUPABASE_URL = "https://lccemvnwmkbmzdyscjqy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjY2Vtdm53bWtibXpkeXNjanF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTY5MTUsImV4cCI6MjA5MzczMjkxNX0.415aOBkflrgd59NmUpld7tXgHARaW0KN0DUlOj-y5eY";

        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const respondentId = urlParams.get('id');

            if (!respondentId) {
                document.getElementById('profile-description').innerHTML = "Errore: ID mancante.";
                return;
            }

            try {
                if (SUPABASE_URL === "IL_TUO_SUPABASE_URL" || !SUPABASE_URL) {
                    showFallbackData(); return;
                }

                const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data: user, error } = await supabaseClient
                    .from('respondents').select('*').eq('id', respondentId).single();

                if (error) throw error;
                if (user) {
                    document.getElementById('rep-name').innerText = user.full_name || 'Candidato';
					document.title = "Report Capitani di Futuro - " + (user.full_name || 'Candidato');
                    if (user.created_at) document.getElementById('rep-date').innerText = new Date(user.created_at).toLocaleDateString('it-IT');
                    
                    if (user.answers) processScores(user.answers);
                }
            } catch (err) { showFallbackData(); }
        });

        function showFallbackData() {
            document.getElementById('rep-name').innerText = "Candidato Esempio";
            document.getElementById('rep-date').innerText = new Date().toLocaleDateString('it-IT');
            setTimeout(() => {
                for (let i = 1; i <= 7; i++) {
                    const bar = document.getElementById(`bar-${i}`);
                    const score = document.getElementById(`score-${i}`);
                    const mock = (Math.random() * (5 - 2.5) + 2.5).toFixed(1);
                    if (bar) bar.style.height = `${(mock / 5) * 100}%`;
                    if (score) { score.innerText = mock; score.style.opacity = "1"; }
                }
            }, 100);
        }

function processScores(answers) {
        let sums = Array(7).fill(0), counts = Array(7).fill(0);
        Object.keys(answers).forEach((qId, index) => {
            const val = parseFloat(answers[qId]) || 0;
            sums[index % 7] += val; counts[index % 7]++;
        });

        let scoresMap = {};

        setTimeout(() => {
            for (let i = 0; i < 7; i++) {
                const avg = counts[i] > 0 ? (sums[i] / counts[i]).toFixed(1) : "3.0";
                
                scoresMap[dims[i]] = parseFloat(avg);

                const s = document.getElementById(`score-${i+1}`);
                const b = document.getElementById(`bar-${i+1}`);
                if (s) { s.innerText = avg; s.style.opacity = "1"; }
                if (b) b.style.height = `${(avg / 5) * 100}%`;
            }
            
            caricaValutazioneQualitativa(scoresMap);
        }, 100);
    }

    function estraiChiave(scoresMap) {
        const variabiliOrdine = ["Leadership", "Collaborazione", "Cambiamento", "Pianificazione", "Autoanalisi", "Motivazione", "Visione", "Istinto"];
        
        let classifica = Object.keys(scoresMap).map(dim => ({
            nome: dim.toUpperCase(),
            punteggio: parseFloat(scoresMap[dim])
        })).sort((a, b) => {
            if (b.punteggio !== a.punteggio) return b.punteggio - a.punteggio;
            
            const indexA = variabiliOrdine.findIndex(v => v.toUpperCase() === a.nome);
            const indexB = variabiliOrdine.findIndex(v => v.toUpperCase() === b.nome);
            return indexA - indexB;
        });

        const p1 = classifica[0];
        const p2 = classifica[1];
        const p3 = classifica[2];

        if (p1.punteggio > p2.punteggio && p2.punteggio === p3.punteggio) {
            const tieSorted = [p2.nome, p3.nome].sort();
            return `TOP_${p1.nome}_TIE_${tieSorted[0]}_${tieSorted[1]}`;
        } else {
            const top2Sorted = [p1.nome, p2.nome].sort();
            return `${top2Sorted[0]}_${top2Sorted[1]}`;
        }
    }

		async function caricaValutazioneQualitativa(scoresMap) {
            const chiave = estraiChiave(scoresMap);
            console.log("CHIAVE CALCOLATA DAL MOTORE:", chiave);
            
            try {
                if (!window.globalSupabase) {
                    window.globalSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
                
                // Modifica chiave: chiediamo a Supabase 'testo, stile'
                const { data, error } = await window.globalSupabase
                    .from('profili_assessment')
                    .select('testo, stile')
                    .eq('chiave', chiave)
                    .single();

                if (error) {
                    console.error("ERRORE SUPABASE:", error);
                    throw error;
                }
                
                if (data) {
                    // Inseriamo il testo giustificato
                    if (data.testo) document.getElementById('profile-description').innerText = data.testo;
                    
                    // Inseriamo il titolo accanto a "VALUTAZIONE QUALITATIVA"
                    if (data.stile) document.getElementById('profile-style').innerText = "— " + data.stile;
                }
            } catch (err) {
                console.error("ERRORE BLOCCANTE:", err);
                document.getElementById('profile-description').innerText = "Impossibile caricare l'analisi interpretativa. Guarda la console!";
            }
        }
	</script>
</body>
</html>
