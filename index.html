<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capitani di Futuro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Loader personalizzato */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-6xl">
        <div id="app-content" class="w-full">
            <div id="loader-view" class="flex flex-col items-center justify-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-slate-400 text-sm font-medium animate-pulse">Caricamento Capitani di Futuro...</p>
            </div>
        </div>

        <div id="progress-section" class="mt-8 hidden">
			<div class="flex justify-between text-xs md:text-sm font-semibold uppercase text-slate-500 mb-3 tracking-widest">
				<span id="progress-step"></span>
				<span id="progress-percent"></span>
			</div>
			<div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
				<div id="progress-fill" class="h-full bg-blue-600 transition-all duration-500" style="width: 0%"></div>
			</div>
		</div>

		<footer id="nav-footer" class="mt-12 flex justify-between items-center hidden px-2">
			<button id="btn-prev" class="text-base font-bold text-slate-400 hover:text-slate-900 transition-colors uppercase tracking-[0.2em]">Indietro</button>
			<button id="btn-next" class="hidden"></button> </footer>
        </footer>

        <div id="error-view" class="hidden text-center py-10">
            <p id="error-message" class="text-red-500 font-bold mb-4"></p>
            <button onclick="location.reload()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase">Riprova</button>
        </div>
    </main>

    <script src="app-v3.js"></script>
</body>
</html>
